name: Release Windows

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build Windows app
        run: |
          uv run flet build windows `
            --project PickPic `
            --artifact pickpic `
            --build-version ${{ github.ref_name }} `
            --no-rich-output `
            --yes
        shell: pwsh

      - name: Zip artifact
        run: |
          Compress-Archive -Path build\windows\* -DestinationPath pickpic-windows-${{ github.ref_name }}.zip
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PickPic ${{ github.ref_name }}
          generate_release_notes: true
          files: pickpic-windows-${{ github.ref_name }}.zip
